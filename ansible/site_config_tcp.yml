- hosts: myhosts
  tasks:
    - name: Ensure subsystem is configured
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^Subsystem\s+echo-subsystem'
        line: 'Subsystem echo-subsystem /usr/bin/nc localhost 2222'
        state: present
      notify: Restart sshd
      become: True

  handlers:
    - name: Restart sshd
      service:
        name: sshd
        state: restarted
      become: True

